; OJS PHP configuration overrides
; Only directives that differ from PHP defaults are listed here.

[PHP]
memory_limit = 256M
max_execution_time = 300
max_input_time = 120

; File uploads — OJS handles large submission files
post_max_size = 128M
upload_max_filesize = 128M
max_file_uploads = 20

; Production security
expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On

; Output handling
output_buffering = 4096
zlib.output_compression = Off

; Disable dangerous functions in production
allow_url_include = Off
